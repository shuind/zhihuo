services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: zhihuo-app:latest
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 3000
      NODE_ENV: production
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - zhihuo-runtime-data:/app/runtime-data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zhihuo}
      POSTGRES_USER: ${POSTGRES_USER:-zhihuo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zhihuo_change_me}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - zhihuo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  zhihuo-pgdata:
  zhihuo-runtime-data:

