services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: zhihuo-app:latest
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 3000
      NODE_ENV: production
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zhihuo}
      POSTGRES_USER: ${POSTGRES_USER:-zhihuo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zhihuo_change_me}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - zhihuo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zhihuo} -d ${POSTGRES_DB:-zhihuo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  zhihuo-pgdata:

