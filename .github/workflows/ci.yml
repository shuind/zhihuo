name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Start app
        run: |
          pnpm start > /tmp/zhihuo-app.log 2>&1 &
          echo $! > /tmp/zhihuo-app.pid

      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3000/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time."
          cat /tmp/zhihuo-app.log || true
          exit 1

      - name: API route smoke
        env:
          TEST_BASE_URL: http://127.0.0.1:3000
        run: pnpm run test:api-routes

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/zhihuo-app.pid ]; then
            kill "$(cat /tmp/zhihuo-app.pid)" || true
          fi
          cat /tmp/zhihuo-app.log || true
