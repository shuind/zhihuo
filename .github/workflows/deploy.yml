name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            mkdir -p ${{ secrets.DEPLOY_PATH }}
            test -w ${{ secrets.DEPLOY_PATH }}

      - name: Upload source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "app,components,lib,db,public,scripts,package.json,pnpm-lock.yaml,next.config.mjs,next-env.d.ts,postcss.config.mjs,tailwind.config.ts,tsconfig.json,Dockerfile,docker-compose.yml,.dockerignore,.npmrc"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true
          rm: false
          strip_components: 0
          tar_tmp_path: /tmp
          tar_dereference: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            mkdir -p ${{ secrets.DEPLOY_PATH }}
            cd ${{ secrets.DEPLOY_PATH }}
            test -f docker-compose.yml
            test -f .env.production
            docker compose up -d --build --pull never
            docker compose ps
            for i in {1..30}; do
              if curl -sf http://127.0.0.1:3000/v1/health >/dev/null; then
                echo "healthcheck ok"
                exit 0
              fi
              sleep 2
            done
            echo "healthcheck failed"
            docker compose logs --tail=120 app || true
            exit 1
