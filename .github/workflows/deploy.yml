name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Prepare deploy directory
        shell: bash
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT || 22 }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}' && test -w '${{ secrets.DEPLOY_PATH }}'"

      - name: Upload source to server
        shell: bash
        run: |
          set -euo pipefail
          files=(
            app components lib db public scripts
            package.json pnpm-lock.yaml next.config.mjs next-env.d.ts
            postcss.config.mjs tailwind.config.ts tsconfig.json
            Dockerfile docker-compose.yml .dockerignore
          )
          if [ -f .npmrc ]; then
            files+=(.npmrc)
          fi
          tar -czf /tmp/zhihuo-deploy.tgz "${files[@]}"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -P "${{ secrets.DEPLOY_PORT || 22 }}" \
            /tmp/zhihuo-deploy.tgz "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/zhihuo-deploy.tgz"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT || 22 }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "tar -xzf /tmp/zhihuo-deploy.tgz -C '${{ secrets.DEPLOY_PATH }}' && rm -f /tmp/zhihuo-deploy.tgz"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 35m
          script: |
            set -e
            mkdir -p ${{ secrets.DEPLOY_PATH }}
            cd ${{ secrets.DEPLOY_PATH }}
            test -f docker-compose.yml
            test -f .env.production
            cat > .npmrc <<'EOF'
            registry=https://registry.npmmirror.com
            fetch-retries=5
            fetch-retry-mintimeout=20000
            fetch-retry-maxtimeout=120000
            network-timeout=600000
            EOF
            up_rc=0
            docker compose up -d --build --pull never || up_rc=$?
            docker compose ps

            app_container="$(docker compose ps -q app)"
            postgres_container="$(docker compose ps -q postgres)"
            test -n "$app_container"
            test -n "$postgres_container"

            for i in {1..60}; do
              app_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$app_container" 2>/dev/null || echo missing)"
              postgres_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$postgres_container" 2>/dev/null || echo missing)"
              echo "app=$app_status postgres=$postgres_status attempt=$i"

              if [ "$app_status" = "healthy" ] && [ "$postgres_status" = "healthy" ]; then
                if curl -sf http://127.0.0.1:3000/v1/health >/dev/null; then
                  echo "healthcheck ok"
                  exit 0
                fi
              fi
              sleep 2
            done

            echo "deploy verification failed (docker compose up rc=${up_rc})"
            docker compose ps || true
            docker compose logs --tail=200 postgres app || true
            exit 1

      - name: Cleanup SSH key
        if: always()
        shell: bash
        run: |
          rm -f ~/.ssh/deploy_key
